---
name: "Copilot Setup Steps"
"on":
  workflow_dispatch: null
  push:
    paths:
    - ".github/workflows/copilot-setup-steps.yml"
  pull_request:
    paths:
    - ".github/workflows/copilot-setup-steps.yml"
jobs:
  copilot-setup-steps:
    runs-on: "ubuntu-latest"
    env:
      GH_TOKEN: "${{secrets.GH_TOKEN}}"
      TESTCONTAINERS_RYUK_DISABLED: true
    timeout-minutes: 360
    permissions:
      contents: "read"
      security-events: "read"
    steps:
    - name: "Install Podman"
      uses: "redhat-actions/podman-install@main"
    - name: "Set DOCKER_HOST to rootless Podman socket"
      run: "echo \"DOCKER_HOST=unix:///run/$(id -u)/podman/podman.sock\" >> $GITHUB_ENV"
    - run: "echo \"$DOCKER_HOST\""
    - uses: "actions/checkout@v6"
    - name: "Set up JDK"
      uses: "actions/setup-java@v5"
      with:
        distribution: "graalvm"
        java-version: "25"
        java-package: "jdk"
    - name: "Set up Gradle"
      uses: "gradle/actions/setup-gradle@v6"
      with:
        dependency-graph: "disabled"
    - run: "podman version"
    - run: "./gradlew --version"
    - run: "./gradlew clean spotlessCheck build --console=plain --no-daemon"
