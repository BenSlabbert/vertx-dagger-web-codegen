---
name: "Java + Gradle"
"on":
  push:
    branches:
    - "main"
  pull_request:
    branches:
    - "main"
jobs:
  build:
    runs-on: "ubuntu-latest"
    env:
      GH_TOKEN: "${{secrets.GH_TOKEN}}"
      TESTCONTAINERS_RYUK_DISABLED: true
    timeout-minutes: 360
    permissions:
      actions: "read"
      contents: "read"
      security-events: "write"
    steps:
    - name: "Install Podman"
      uses: "redhat-actions/podman-install@main"
    - name: "Set DOCKER_HOST to rootless Podman socket"
      run: "echo \"DOCKER_HOST=unix:///run/$(id -u)/podman/podman.sock\" >> $GITHUB_ENV"
    - run: "echo \"$DOCKER_HOST\""
    - uses: "actions/checkout@v6"
    - name: "Set up JDK"
      uses: "actions/setup-java@v5"
      with:
        distribution: "graalvm"
        java-version: "25"
        java-package: "jdk"
    - name: "Set up Gradle"
      uses: "gradle/actions/setup-gradle@v6"
      with:
        dependency-graph: "generate-and-submit"
    - name: "Initialize CodeQL"
      uses: "github/codeql-action/init@v4"
      with:
        languages: "java"
    - run: "podman version"
    - run: "./gradlew --version"
    - run: "./gradlew clean spotlessCheck build --console=plain --no-daemon"
    - name: "Perform CodeQL Analysis"
      uses: "github/codeql-action/analyze@v4"
